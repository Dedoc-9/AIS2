name: AIS² CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e ".[dev]"

    - name: Run tests
      run: pytest tests/ -v --cov=phase_c --cov=validator

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml

  lint:
    name: Linting & Type Checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black ruff mypy

    - name: Run black
      run: black --check .

    - name: Run ruff
      run: ruff check .

    - name: Run mypy
      run: mypy phase_c validator trace_exporter --ignore-missing-imports

  reproducibility:
    name: Determinism Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run minimal system (Run 1)
      run: python examples/minimal_system.py && cp traces/minimal_trace.json traces/minimal_trace_run1.json

    - name: Run minimal system (Run 2)
      run: python examples/minimal_system.py && cp traces/minimal_trace.json traces/minimal_trace_run2.json

    - name: Verify determinism
      run: |
        diff <(jq '.[] | {event_type, timestamp, payload}' traces/minimal_trace_run1.json) \
             <(jq '.[] | {event_type, timestamp, payload}' traces/minimal_trace_run2.json) && \
        echo "✓ Determinism verified: traces are identical"

    - name: Run failure demo
      run: python examples/failure_demo.py

    - name: Run omega demo
      run: python examples/omega_transition_demo.py

    - name: Verify all traces exist
      run: |
        test -f traces/minimal_trace.json && echo "✓ minimal_trace.json"
        test -f traces/failure_trace.json && echo "✓ failure_trace.json"
        test -f traces/omega_trace.json && echo "✓ omega_trace.json"
